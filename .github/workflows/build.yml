name: Build NvChad Offline Package

on:
  workflow_dispatch:
    inputs:
      parsers:
        description: 'Treesitter parsers (comma-separated)'
        required: true
        default: 'lua,vim,vimdoc,python,javascript,typescript,json,html,css,bash,c,cpp'
        type: string
      lsp:
        description: 'Mason LSP servers (comma-separated)'
        required: true
        default: 'lua_ls'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # Use Ubuntu 20.04 container for glibc 2.31 compatibility
      # Binaries work on both Ubuntu 20.04 and 22.04
      image: ubuntu:20.04
      options: --user root

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git curl ca-certificates \
            gcc g++ make \
            tree
          rm -rf /var/lib/apt/lists/*

      - name: Install Neovim
        run: |
          curl -LO https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz
          tar xzf nvim-linux-x86_64.tar.gz
          mv nvim-linux-x86_64 /opt/nvim
          ln -s /opt/nvim/bin/nvim /usr/local/bin/nvim
          nvim --version

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build offline package
        env:
          PARSERS: ${{ inputs.parsers }}
          LSP: ${{ inputs.lsp }}
        run: |
          chmod +x build.sh
          ./build.sh --treesitter "$PARSERS" --mason "$LSP"

      - name: Show package contents
        run: |
          echo "## Package Contents" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tree nvchad-offline || ls -R nvchad-offline
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## File Sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh nvchad-offline.tar.gz
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvchad-offline-ubuntu
          path: nvchad-offline.tar.gz
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nvchad-offline-ubuntu

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: nvchad-offline.tar.gz