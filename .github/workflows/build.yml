name: Build LazyVim Offline Package

on:
  workflow_dispatch:
    inputs:
      parsers:
        description: 'Treesitter parsers (comma-separated)'
        required: true
        default: 'lua,vim,vimdoc,python,javascript,typescript,json,html,css,bash,c,cpp'
        type: string
      lsp:
        description: 'Mason LSP servers (comma-separated)'
        required: true
        default: 'lua_ls'
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --user root
    env:
      DEBIAN_FRONTEND: noninteractive
      HOME: /root

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            git curl ca-certificates \
            gcc g++ make cmake \
            gettext unzip \
            libclang-dev \
            tree sudo
          rm -rf /var/lib/apt/lists/*

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build offline package
        env:
          PARSERS: ${{ inputs.parsers }}
          LSP: ${{ inputs.lsp }}
        run: |
          chmod +x build.sh
          ./build.sh --treesitter "$PARSERS" --mason "$LSP"

      - name: Show package contents
        run: |
          echo "## Package Contents" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tree lazyvim-offline || ls -R lazyvim-offline
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Neovim Binary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          lazyvim-offline/nvim/linux-x64/bin/nvim --version | head -3
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## File Sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh lazyvim-offline.tar.gz
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Plugins Included" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls lazyvim-offline/lazy-plugins/
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazyvim-offline-ubuntu
          path: lazyvim-offline.tar.gz
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: lazyvim-offline-ubuntu

      - name: Get date tag
        id: date
        run: echo "tag=v$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.date.outputs.tag }}
          name: LazyVim Offline Build ${{ steps.date.outputs.tag }}
          draft: false
          files: lazyvim-offline.tar.gz
          body: |
            ## LazyVim Offline Package

            Includes Neovim binary + LazyVim + all plugins for offline use.

            Built on Ubuntu 20.04 (glibc 2.31) for compatibility with:
            - Ubuntu 20.04
            - Ubuntu 22.04

            ### Included
            - Neovim (latest stable)
            - LazyVim starter config
            - All LazyVim plugins (pre-downloaded)
            - Treesitter parsers: ${{ inputs.parsers }}
            - Mason LSP: ${{ inputs.lsp }}

            ### Usage
            ```bash
            tar -xzf lazyvim-offline.tar.gz
            cd lazyvim-offline
            ./install.sh

            # Add to PATH if needed
            export PATH="$HOME/.local/bin:$PATH"

            # Start LazyVim
            nvim
            ```
