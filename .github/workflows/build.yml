name: Build NvChad Offline Package

on:
  workflow_dispatch:
    inputs:
      parsers:
        description: 'Treesitter parsers (comma-separated)'
        required: true
        default: 'lua,vim,vimdoc,python,javascript,typescript,json,html,css,bash,c,cpp'
        type: string
      lsp:
        description: 'Mason LSP servers (comma-separated)'
        required: true
        default: 'lua_ls'
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --user root
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            git curl ca-certificates \
            gcc g++ make cmake \
            gettext unzip \
            tree
          rm -rf /var/lib/apt/lists/*

      - name: Build Neovim from source
        run: |
          git clone --depth 1 --branch stable https://github.com/neovim/neovim.git
          cd neovim
          make CMAKE_BUILD_TYPE=Release
          make install
          nvim --version

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build offline package
        env:
          PARSERS: ${{ inputs.parsers }}
          LSP: ${{ inputs.lsp }}
        run: |
          chmod +x build.sh
          ./build.sh --treesitter "$PARSERS" --mason "$LSP"

      - name: Show package contents
        run: |
          echo "## Package Contents" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tree nvchad-offline || ls -R nvchad-offline
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## File Sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh nvchad-offline.tar.gz
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvchad-offline-ubuntu
          path: nvchad-offline.tar.gz
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nvchad-offline-ubuntu

      - name: Get date tag
        id: date
        run: echo "tag=v$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.date.outputs.tag }}
          name: NvChad Offline Build ${{ steps.date.outputs.tag }}
          draft: false
          files: nvchad-offline.tar.gz
          body: |
            ## NvChad Offline Package

            Built on Ubuntu 20.04 (glibc 2.31) for compatibility with:
            - Ubuntu 20.04
            - Ubuntu 22.04

            ### Included
            - Treesitter parsers: ${{ inputs.parsers }}
            - Mason LSP: ${{ inputs.lsp }}

            ### Usage
            ```bash
            tar -xzf nvchad-offline.tar.gz
            cd nvchad-offline
            ./install.sh
            ```